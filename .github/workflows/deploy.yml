name: Deploy Blogatto to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      # Обновили до v5, чтобы убрать предупреждение о Node.js 20
      - name: Checkout code
        uses: actions/checkout@v5 

      # Устанавливаем Erlang и Gleam
      - name: Set up Erlang/OTP and Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.x'
          gleam-version: '1.x'

      # Скачиваем зависимости Gleam
      - name: Download dependencies
        run: gleam deps download

      # Проверяем структуру папок перед сборкой (для отладки)
      - name: Debug before build
        run: ls -la

      # Собираем статический сайт с помощью blogatto
      - name: Build static site
        run: gleam run

      # Проверяем, куда blogatto положил файлы (для отладки)
      - name: Debug after build
        run: ls -la

      # Обновили до v5, чтобы убрать предупреждение о Node.js 20
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      # Деплоим напрямую через Wrangler
      - name: Deploy to Cloudflare Pages via Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Внимание: если шаги отладки покажут, что папки 'build' нет, 
        # мы сразу поймем, как называется правильная директория.
        run: npx wrangler pages deploy dist --project-name="bitcoin-austrian-blog" --branch="main"
