name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.x'
          gleam-version: '1.x'

      - name: Download deps
        run: gleam deps download

      - name: Build site
        run: gleam run

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create "bitcoin-austrian-blog" --production-branch="main" || true
          npx wrangler pages deploy dist --project-name="bitcoin-austrian-blog" --branch="main"
