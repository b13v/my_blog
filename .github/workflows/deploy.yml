name: Deploy Blogatto to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Устанавливаем Erlang и Gleam
      - name: Set up Erlang/OTP and Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.x'
          gleam-version: '1.x'

      # Скачиваем зависимости Gleam
      - name: Download dependencies
        run: gleam deps download

      # Собираем статический сайт с помощью blogatto
      - name: Build static site
        run: gleam run

      # Устанавливаем Node.js окружение для запуска Wrangler
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Устанавливаем Wrangler и деплоим напрямую в Cloudflare Pages
      - name: Deploy to Cloudflare Pages via Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist --project-name="bitcoin-austrian-blog" --branch="main"
